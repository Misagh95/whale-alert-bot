services:
  - type: web
    name: whale-alert-bot
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: CHECK_INTERVAL
        value: 120
      - key: MIN_VALUE
        value: 100000
